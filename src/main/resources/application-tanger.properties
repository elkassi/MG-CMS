spring.jpa.database=SQL_SERVER

# ==================== Flyway (Phase 2+ migrations) ====================
# Existing schema predates Flyway, so baseline at V1 and let V2_01..V9_01 run.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# ==================== Dispatcher / Engine feature flags ====================
# Enable Phase 4 Process Dispatcher (preview/publish endpoints, /processDispatcher).
mgcms.dispatcher.enabled=true
# Local shadow routing: allow preview/publish from zone hosting even when
# chef confirmations have not been seeded into the local production copy yet.
mgcms.dispatcher.allow-unconfirmed-zones=true
cms.dispatcher.ordering=v2
# Engine zone-awareness enabled: required for /engineControl to function.
mgcms.engine.zone-aware=true
mgcms.engine.auto-tick.enabled=false
mgcms.admission.enforce=false
mgcms.shift.duration-minutes=460
mgcms.retention.enabled=false
mgcms.engine.self-heal.enabled=false
mgcms.integration.cms-prod.api-key=${MGCMS_CMSPROD_API_KEY:}

# ==================== Engine optimizer weights (Option C) ====================
# Primary: balance the (zone × machineType) load matrix.
mgcms.engine.optimizer.spread-weight=1.0
# Box-duration KPI weights (min/box). Mean drives the average sequence's
# pace, max guards the worst-case sequence so no single one is starved.
mgcms.engine.optimizer.box-duration-weight=2.0
mgcms.engine.optimizer.box-duration-max-weight=0.5
# Intra-zone machine-type spread — operator complaint #1 (idle Lectra IP6
# while Lectra is queued). Defaults small until Slice 3 ships Level-2 moves.
mgcms.engine.optimizer.intra-zone-machine-load-weight=0.0
# Lateness penalty: heavier when due date is close.
mgcms.engine.optimizer.lateness-weight=0.2
# Material advisory: tiny — material is for logistics alert, not gating.
mgcms.engine.optimizer.material-alert-weight=0.01
# Cycle-time terms (legacy — kept 0 until proper schedule-aware cycle).
mgcms.engine.optimizer.cycle-avg-weight=0.0
mgcms.engine.optimizer.cycle-max-weight=0.0
# Convergence throttle: pause loop iters when no improvement for N iters.
mgcms.engine.optimizer.convergence-iterations=2000
mgcms.engine.optimizer.converged-sleep-ms=10000
mgcms.engine.optimizer.improvement-epsilon=0.05
# Due-date urgency curve: weight = 1 + dueDateGain / (1 + daysToDue).
mgcms.engine.optimizer.due-date-gain=9.0

